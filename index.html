<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HBLE – Enter</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
      transition: opacity 1.5s ease;
      min-height: 100vh;
    }

    .background-fade {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: url('images/terrebonnestorm1.jpg') no-repeat center center;
      background-size: cover;
      opacity: 0.29;
      z-index: -1;
      pointer-events: none;
    }

    .logo-screen {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 70vh;
      text-align: center;
      position: relative;
      padding-top: 32px;
      z-index: 3;
    }

    /* Crown Animation */
    .crown-anim {
      position: absolute;
      left: 50%;
      top: -55px;
      width: 90px;
      height: auto;
      transform: translateX(-50%) rotate(-17deg) scale(1.07);
      filter: drop-shadow(0 0 30px gold) drop-shadow(0 0 25px #fff8) brightness(1.08);
      opacity: 0;
      animation:
        dropCrown 2s cubic-bezier(.16,1.01,.72,1.03) 0.4s forwards,
        crownGlow 4s infinite alternate;
      z-index: 5;
      pointer-events: none;
    }
    @keyframes dropCrown {
      0% { top: -150px; opacity: 0; }
      60% { top: 10px; opacity: 1; }
      75% { top: -6px; }
      85% { top: 5px; }
      100% { top: 7px; opacity: 1; }
    }
    @keyframes crownGlow {
      0%   { filter: drop-shadow(0 0 16px gold) drop-shadow(0 0 12px #fff8) brightness(1.04); }
      50%  { filter: drop-shadow(0 0 32px orange) drop-shadow(0 0 20px #f3f3aa) brightness(1.19);}
      100% { filter: drop-shadow(0 0 24px lime) drop-shadow(0 0 16px #f8ffdb) brightness(1.14);}
    }

    .logo-text {
      font-size: 8vw;
      font-weight: bold;
      margin-top: 58px;
      margin-bottom: 5px;
      animation: growLogo 2.5s cubic-bezier(.19,1,.41,1.01) forwards, shimmerGlow 6s infinite alternate;
      opacity: 0;
      text-shadow: 0 0 40px #00ff88, 0 0 18px gold;
    }

    @keyframes growLogo {
      0% { transform: scale(0); opacity: 0; }
      55% { transform: scale(1.23); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes shimmerGlow {
      0%   { color: gold;      text-shadow: 0 0 25px gold; }
      30%  { color: #24ff4c;   text-shadow: 0 0 23px #24ff4c; }
      50%  { color: #00ffea;   text-shadow: 0 0 33px #00ffea; }
      70%  { color: #fff400;   text-shadow: 0 0 30px #fff400; }
      100% { color: #ff9100;   text-shadow: 0 0 36px #ff9100; }
    }

    .tagline {
      font-family: 'Brush Script MT', cursive;
      font-size: 4vw;
      margin-top: 7px;
      margin-bottom: 12px;
      color: #fff;
      text-shadow: 0 0 9px #1a6f30, 0 0 2px #fff;
    }

    .enter-text {
      margin-top: 12px;
      font-size: 4.5vw;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.1em;
      padding: 6px 20px;
      opacity: 0;
      animation: fadeIn 1.8s 2.8s forwards, shimmerGlow 8s infinite alternate;
      user-select: none;
      color: #ffee4a;
      text-shadow: 0 0 9px #333, 0 0 8px #fff;
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Carousel */
    .carousel-container {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      width: 100vw;
      z-index: 8;
      background: linear-gradient(to top, #000 50%, transparent 100%);
      padding: 8px 0 0 0;
      box-sizing: border-box;
    }
    .images-row {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding: 8px 8px 10px 8px;
      width: 100vw;
      justify-content: flex-start;
      scroll-behavior: smooth;
      opacity: 0;
      transform: scale(0.9);
      transition: all 2s cubic-bezier(.23,.76,.6,1.01);
    }
    .images-row img {
      scroll-snap-align: center;
      flex: 0 0 auto;
      width: 100px;
      height: 140px;
      border-radius: 12px;
      box-shadow: 0 0 16px #ffee58, 0 0 2px #fff;
      margin: 0 5px;
      background: #232;
      object-fit: cover;
      transition: transform 0.25s;
    }
    .images-row img:active {
      transform: scale(1.1) rotate(-2deg);
    }
    @media (max-width: 500px) {
      .logo-text { font-size: 2.8rem; }
      .tagline, .enter-text { font-size: 1.2rem; }
      .images-row img { width: 76px; height: 104px; }
    }
  </style>
</head>
<body>
  <div class="background-fade"></div>
  <div class="logo-screen" onclick="enterSite()">
    <img src="images/crown.png" alt="Crown" class="crown-anim" />
    <div class="logo-text">HBLE</div>
    <div class="tagline">Humble Beginnings Legendary Endings</div>
    <div class="enter-text" id="typed-text"></div>
  </div>

  <div class="carousel-container">
    <div class="images-row" id="imageRow">
      <img src="images/image1.jpg" alt="Model 1" />
      <img src="images/image2.jpg" alt="Design" />
      <img src="images/image3.jpg" alt="Logo" />
      <img src="images/logoimage9.jpg" alt="Logo" />
      <img src="images/hbleanime.jpg" alt="Logo" />
    </div>
  </div>

  <!-- Audio -->
  <audio id="rain-sound" src="audio/rain.mp3" loop preload="auto" muted playsinline></audio>

  <script>
    // Typewriter effect for YOU MAY ENTER
    const message = "YOU MAY ENTER";
    const typedText = document.getElementById("typed-text");
    let i = 0;
    function typeWriter() {
      if (i < message.length) {
        typedText.textContent += message.charAt(i);
        i++;
        setTimeout(typeWriter, 95);
      }
    }
    setTimeout(typeWriter, 2500);

    // Delay and show images row after 8s
    setTimeout(() => {
      const row = document.getElementById("imageRow");
      row.style.opacity = 1;
      row.style.transform = "scale(1)";
    }, 8000);

    // Auto-scroll carousel
    let scrollInterval;
    window.onload = function () {
      const row = document.getElementById("imageRow");
      row.addEventListener("touchstart", () => clearInterval(scrollInterval), { passive: true });
      row.addEventListener("mousedown", () => clearInterval(scrollInterval));
      setTimeout(() => {
        scrollInterval = setInterval(() => {
          if (!row) return;
          row.scrollLeft += 120;
          if (row.scrollLeft >= row.scrollWidth - row.clientWidth) {
            row.scrollLeft = 0;
          }
        }, 3400);
      }, 9000);

      // Try playing audio on user interaction
      const rainAudio = document.getElementById("rain-sound");
      rainAudio.muted = false;
      document.body.addEventListener('click', () => {
        rainAudio.play().catch(e => {});
        // fade-in
        let vol = 0;
        rainAudio.volume = 0;
        let fade = setInterval(() => {
          if (vol < 0.2) {
            vol += 0.02;
            rainAudio.volume = vol;
          } else {
            clearInterval(fade);
          }
        }, 200);
      }, { once: true });
    };

    function enterSite() {
      document.body.style.opacity = "0";
      clearInterval(scrollInterval);
      setTimeout(() => {
        window.location.href = "mission.html";
      }, 1400);
    }
  </script>
</body>
</html>
