<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HBLE – Enter</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
      transition: opacity 1.5s ease;
    }

    .background-fade {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('images/terrebonnestorm1.jpg') no-repeat center top;
      background-size: cover;
      opacity: 0;
      z-index: -1;
      animation: fadeInBG 4s ease-in-out forwards;
      animation-delay: 2s;
    }
    @keyframes fadeInBG {
      to { opacity: 0.5; }
    }

    .logo-screen {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      height: 100vh;
      text-align: center;
      cursor: pointer;
      padding-top: 30px;
      padding-bottom: 60px;
      position: relative;
      z-index: 3;
    }

    .crown-anim {
      position: absolute;
      left: 50%;
      top: -120px; /* Start way above */
      width: 88px;
      height: auto;
      opacity: 0;   /* Start hidden */
      transform: translateX(-50%) rotate(-24deg);
      z-index: 4;
      filter: drop-shadow(0 0 15px gold);
      animation: dropCrown 1.7s 1.3s cubic-bezier(0.37, 1.6, 0.43, 0.99) forwards, crownGlow 4s infinite alternate;
      pointer-events: none;
    }
    @keyframes dropCrown {
      0%   { top: -120px; opacity: 0; }
      50%  { top: 0px;   opacity: 1; }
      65%  { top: 18px;  opacity: 1; }
      80%  { top: 6px;   opacity: 1; }
      87%  { top: 34px;  opacity: 1; }
      100% { top: 30px;  opacity: 1; }
    }
    @keyframes crownGlow {
      0% { filter: drop-shadow(0 0 18px gold) drop-shadow(0 0 10px #fff);}
      25%{ filter: drop-shadow(0 0 28px #ff00cc) drop-shadow(0 0 12px #fff);}
      50%{ filter: drop-shadow(0 0 30px #0fffcf) drop-shadow(0 0 15px #ff0);}
      75%{ filter: drop-shadow(0 0 25px #ffd700) drop-shadow(0 0 8px #fff);}
      100%{ filter: drop-shadow(0 0 20px gold) drop-shadow(0 0 10px #fff);}
    }

    .logo-text {
      font-size: 5.5rem;
      font-weight: bold;
      animation: growLogo 3s ease-out forwards, shimmerGlow 4s infinite alternate;
      opacity: 0;
      text-shadow: 0 0 30px gold;
      margin-top: 48px; /* push down for crown */
      margin-bottom: 10px;
    }
    @keyframes growLogo {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.3); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes shimmerGlow {
      0%   { color: gold;      text-shadow: 0 0 20px gold; }
      20%  { color: red;       text-shadow: 0 0 20px red; }
      40%  { color: white;     text-shadow: 0 0 25px white; }
      60%  { color: limegreen; text-shadow: 0 0 25px limegreen; }
      80%  { color: orange;    text-shadow: 0 0 20px orange; }
      100% { color: gold;      text-shadow: 0 0 30px gold; }
    }

    .tagline {
      font-family: 'Brush Script MT', cursive;
      font-size: 1.6rem;
      margin-top: 8px;
      white-space: nowrap;
      overflow: hidden;
      border-right: 2px solid white;
      width: 0;
      animation: typing 5s steps(40, end) forwards;
    }
    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    .images-row {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding: 10px 0;
      width: 100%;
      justify-content: flex-start;
      scroll-behavior: smooth;
      opacity: 0;
      transform: scale(0.8);
      transition: all 2s ease;
    }
    .images-row img {
      scroll-snap-align: center;
      flex: 0 0 auto;
      width: 100px;
      height: 140px;
      border-radius: 10px;
      box-shadow: 0 0 15px yellow;
      margin: 0 10px;
    }
    .enter-text {
      margin-top: 20px;
      font-size: 1.2rem;
      font-family: 'Courier New', monospace;
      padding: 10px 30px;
      opacity: 0;
      animation: fadeIn 2s 4s forwards, shimmerGlow 8s infinite alternate;
      user-select: none;
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    ::-webkit-scrollbar {
      display: none;
    }
    @media (max-width: 600px) {
      .logo-text { font-size: 3.1rem; margin-top: 44px; }
      .crown-anim { width: 54px; }
    }
  </style>
</head>
<body>
  <!-- Background -->
  <div class="background-fade"></div>

  <!-- Main content with animated crown -->
  <div class="logo-screen" onclick="enterSite()">
    <img src="images/crown.png" alt="Crown" class="crown-anim" />
    <div class="logo-text">HBLE</div>
    <div class="tagline">Humble Beginnings Legendary Endings</div>
    <div class="enter-text" id="typed-text"></div>
  </div>

  <!-- Carousel pinned bottom -->
  <div style="position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; z-index: 3;">
    <div class="images-row" id="imageRow">
      <img src="images/image1.jpg" alt="Model 1" />
      <img src="images/image2.jpg" alt="Design" />
      <img src="images/image3.jpg" alt="Logo" />
      <img src="images/logoimage9.jpg" alt="Logo" />
      <img src="images/hbleanime.jpg" alt="Logo" />
    </div>
  </div>

  <!-- Audio -->
  <audio id="rain-sound" src="audio/rain.mp3" loop preload="auto" muted playsinline></audio>

  <!-- JavaScript -->
  <script>
    const message = "YOU MAY ENTER";
    const typedText = document.getElementById("typed-text");
    let i = 0;

    function typeWriter() {
      if (i < message.length) {
        typedText.textContent += message.charAt(i);
        i++;
        setTimeout(typeWriter, 150);
      }
    }
    setTimeout(typeWriter, 4000);

    setTimeout(() => {
      const row = document.getElementById("imageRow");
      row.style.opacity = 1;
      row.style.transform = "scale(1)";
    }, 8000);

    let scrollInterval;

    window.onload = function () {
      const rainAudio = document.getElementById("rain-sound");
      rainAudio.muted = false;

      // Try autoplay as soon as page is interacted with
      document.body.addEventListener('click', () => {
        rainAudio.play().catch(e => console.warn("Blocked:", e));
      }, { once: true });

      // Try triggering when images load
      const images = document.querySelectorAll(".images-row img");
      let loaded = 0;
      images.forEach(img => {
        img.addEventListener("load", () => {
          loaded++;
          if (loaded === images.length) {
            rainAudio.play().then(() => {
              rainAudio.muted = false;
              fadeInRain(rainAudio);
            }).catch(e => console.warn("Still blocked:", e));
          }
        });
      });

      // Fade in sound
      function fadeInRain(audio) {
        let vol = 0;
        const fade = setInterval(() => {
          if (vol < 0.2) {
            vol += 0.02;
            audio.volume = vol;
          } else {
            clearInterval(fade);
          }
        }, 200);
      }

      // Auto-scroll images
      const row = document.getElementById("imageRow");
      let scrollPosition = 0;
      scrollInterval = setInterval(() => {
        scrollPosition += 120;
        if (scrollPosition >= row.scrollWidth - row.clientWidth) {
          scrollPosition = 0;
        }
        row.scrollTo({ left: scrollPosition, behavior: 'smooth' });
      }, 3500);
    };

    function enterSite() {
      document.body.style.opacity = "0";
      clearInterval(scrollInterval);
      setTimeout(() => {
        window.location.href = "mission.html";
      }, 1500);
    }
  </script>
</body>
</html>
