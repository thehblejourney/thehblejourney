<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HBLE – Enter</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
      transition: opacity 1.5s ease;
    }

    .logo-screen {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      cursor: pointer;
    }

    .logo-text {
      font-size: 4rem;
      font-weight: bold;
      animation: growLogo 3s ease-out forwards, glowCycle 8s infinite alternate;
      opacity: 0;
      text-shadow: 0 0 20px gold;
    }

    @keyframes growLogo {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.3); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes glowCycle {
      0%   { color: gold;      text-shadow: 0 0 20px gold; }
      25%  { color: red;       text-shadow: 0 0 20px red; }
      50%  { color: white;     text-shadow: 0 0 20px white; }
      75%  { color: limegreen; text-shadow: 0 0 20px limegreen; }
      100% { color: orange;    text-shadow: 0 0 20px orange; }
    }

    .tagline {
      font-family: 'Brush Script MT', cursive;
      font-size: 1.6rem;
      margin-top: 10px;
      white-space: nowrap;
      overflow: hidden;
      border-right: 2px solid white;
      width: 0;
      animation: typing 5s steps(40, end) forwards;
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    .images-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 30px;
      opacity: 0;
      transform: scale(0.8);
      transition: all 2s ease;
    }

    .images-row img {
      width: 100px;
      height: 140px;
      border-radius: 10px;
      box-shadow: 0 0 15px yellow;
    }

    .enter-text {
      margin-top: 40px;
      font-size: 1.2rem;
      font-family: 'Courier New', monospace;
      padding: 10px 30px;
      opacity: 0;
      animation: fadeIn 2s 4s forwards, glowCycle 8s infinite alternate;
      user-select: none;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="logo-screen" onclick="enterSite()">
    <div class="logo-text">HBLE</div>
    <div class="tagline">Humble Beginnings Legendary Endings</div>

    <div class="images-row" id="imageRow">
      <img src="Images/image1.jpg" alt="Model 1" />
      <img src="Images/image2.jpg" alt="Design" />
      <img src="Images/image3.jpg" alt="Logo" />
    </div>

    <div class="enter-text" id="typed-text"></div>
  </div>

  <audio id="bg-music" src="audio/PhantomoftheOpera.mp3" autoplay muted playsinline preload="auto" style="opacity:0; height:0;"></audio>

  <script>
    const message = "YOU MAY ENTER";
    const typedText = document.getElementById("typed-text");
    let i = 0;

    function typeWriter() {
      if (i < message.length) {
        typedText.textContent += message.charAt(i);
        i++;
        setTimeout(typeWriter, 150);
      }
    }

    setTimeout(() => {
      const row = document.getElementById("imageRow");
      row.style.opacity = 1;
      row.style.transform = "scale(1)";
    }, 3000);

    setTimeout(typeWriter, 4000);

    window.onload = function () {
      const audio = document.getElementById("bg-music");
      audio.volume = 0;
      audio.muted = false;
      const playAttempt = audio.play();

      if (playAttempt !== undefined) {
        playAttempt
          .then(() => {
            const fade = setInterval(() => {
              if (audio.volume < 1) {
                audio.volume = Math.min(audio.volume + 0.05, 1);
              } else {
                clearInterval(fade);
              }
            }, 200);
          })
          .catch(err => {
            console.warn("Autoplay blocked until user interacts.");
          });
      }
    };

    function enterSite() {
      document.body.style.opacity = "0";
      setTimeout(() => {
        window.location.href = "mission.html";
      }, 1500);
    }
  </script>
</body>
</html>
